services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - falkordb_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Optional: BGE Reranker
  # Uncomment if you want the reranker as a container.
  # Otherwise, run tools/brain/reranker.py directly on the host with GPU access.
  #
  # reranker:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.reranker
  #   ports:
  #     - "8006:8006"
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - capabilities: [gpu]

  brain:
    build: .
    ports:
      - "127.0.0.1:7777:7777"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - FALKORDB_HOST=falkordb
      - OLLAMA_URL=http://host.docker.internal:11434
    depends_on:
      qdrant:
        condition: service_healthy
      falkordb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7777/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  rasputin-mcp:
    build:
      context: .
      dockerfile: tools/mcp/Dockerfile
    ports:
      - "127.0.0.1:8808:8808"
    environment:
      - RASPUTIN_URL=http://brain:7777
      - RASPUTIN_TOKEN=${MEMORY_API_TOKEN:-}
      - MCP_HOST=0.0.0.0
    depends_on:
      brain:
        condition: service_healthy

volumes:
  qdrant_storage:
  falkordb_data:
