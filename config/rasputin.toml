[server]
port = 7777
host = "127.0.0.1"

[qdrant]
url = "http://localhost:6333"
collection = "second_brain"

[graph]
host = "localhost"
port = 6380
graph_name = "brain"
disabled = false

[embeddings]
provider = "gemini"
fallback = "ollama"
url = "http://localhost:11434/api/embed"
model = "nomic-embed-text"
dimensions = 768
prefix_query = "search_query: "
prefix_doc = "search_document: "

[reranker]
provider = "cohere"
fallback = "local"
model = "rerank-v3.5"
url = "http://localhost:8006/rerank"
timeout = 15
enabled = true
llm_reranker = true
llm_reranker_model = "claude-haiku-4-20250414"

[llm]
provider = "anthropic"
model = "claude-haiku-4-5-20251001"

[benchmark]
answer_model = "claude-haiku-4-5-20251001"
judge_model = "gpt-4o-mini-2024-07-18"
context_chunks = 60
search_limit = 60
compare_answer_model = "gpt-4o-mini"

[amac]
threshold = 4.0
timeout = 30
model = "qwen2.5:14b"
url = "http://localhost:11434/v1/chat/completions"

[scoring]
decay_half_life_low = 14
decay_half_life_medium = 60
decay_half_life_high = 365

[constraints]
enabled = true
model = "claude-sonnet-4-6"
timeout = 15
provider = "anthropic"

[reflect]
provider = "anthropic"
model = "claude-haiku-4-5-20251001"
max_tokens = 1000

[entities]
known_entities_path = "config/known_entities.json"
